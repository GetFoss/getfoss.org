backend:
  name: github
  repo: GetFoss/getfoss.org
  branch: main

media_folder: static/images
public_folder: /images

collections:
  - name: "debian-ubuntu"
    label: "Debian-Ubuntu"
    folder: "content/debian-ubuntu"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description (SEO)", name: "description", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ"}
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Tags", name: "tags", widget: "list", allow_add: true}
      - {label: "Aliases (old URLs)", name: "aliases", widget: "list", allow_add: true, required: false}
      - {label: "Body", name: "body", widget: "markdown"}

